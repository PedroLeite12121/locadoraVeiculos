<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/cssGeral/navStyles.css">
    <link rel="stylesheet" href="/cadastroCliente/styles.css">
    <link rel="stylesheet" href="/cssGeral/loginCadastroFormStyles.css">
</head>
<body>
    <nav>
        <div class="nomeNav"><a href="/main/index.html">Locadoras321</a></div>

        <div class="mainNav">
            <a href="/main/index.html">Home</a>
            <a href="">Sobre nós</a>
            <a href="">Contatos</a>
        </div>

        <div class="navOpcoesEntrada">
        <a href="/cadastroVeiculo/cadastroVeiculo.html" id="addVeiculoNav">Adicionar Veículo</a>
        <a href="/cadastroCliente/cadastroCliente.html" id="cadastroNav">Cadastro</a>
        <a href="/loginCliente/loginCliente.html" id="loginNav">Login</a>
        
        </div>
    
    </nav>

    <form id="clienteForm">
            <h1>Cadastro</h1>

            <p>Nome</p>
            <input type="text" name="nome" placeholder="Digite seu nome" required><br>
            <p>Email</p>
            <input type="email" name="email" placeholder="Digite seu email" required><br>
            <p>Número de Telefone</p>
            <input type="number" name="telefone" placeholder="Digites seu número de Telefone" required><br>
            <p>Senha</p>
            <input type="password" name="senha" placeholder="Digite sua senha" required><br>
            <a href="/loginCliente/loginCliente.html">Já sou cliente</a>
            <button type="submit">Cadastrar</button>
        </form>



    <script>
        const form = document.getElementById("clienteForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = Object.fromEntries(new FormData(form));

            const res = await fetch("/usuarios/cadastroUsuario", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            });

            const result = await res.json();
            alert(result.message);
        });
    </script>
</body>
</html>
